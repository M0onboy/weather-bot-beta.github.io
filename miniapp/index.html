<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Weather Mini App</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="hero" aria-live="polite">
        <div class="topbar">
          <button class="icon-button" id="geoButton" title="Определить геолокацию">⌖</button>
          <form class="search" id="searchForm">
            <input id="cityInput" type="search" placeholder="Город" autocomplete="off" />
          </form>
          <button class="icon-button" id="refreshButton" title="Обновить">↻</button>
        </div>

        <div class="current">
          <p class="location" id="locationName">Загрузка...</p>
          <h1 id="temperature">--°</h1>
          <p class="condition" id="condition">Получаем прогноз</p>
          <p class="range" id="range">Макс. --° Мин. --°</p>
        </div>
      </section>

      <section class="panel hourly-panel">
        <h2>По часам</h2>
        <div class="hourly" id="hourly"></div>
      </section>

      <section class="panel">
        <h2>Прогноз на 7 дней</h2>
        <div class="daily" id="daily"></div>
      </section>

      <section class="stats-grid" id="stats"></section>
    </main>

    <template id="hourTemplate">
      <article class="hour-card">
        <span class="hour"></span>
        <span class="hour-icon"></span>
        <strong class="hour-temp"></strong>
        <span class="hour-rain"></span>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
