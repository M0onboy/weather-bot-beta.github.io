<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Weather Mini App</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <canvas id="weatherCanvas" aria-hidden="true"></canvas>
    <div id="webglWeather" aria-hidden="true"></div>
    <main class="app-shell">
      <section class="hero" aria-live="polite">
        <div class="topbar">
          <button class="icon-button" id="geoButton" title="Определить геолокацию" aria-label="Определить геолокацию">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 2v3" />
              <path d="M12 19v3" />
              <path d="M2 12h3" />
              <path d="M19 12h3" />
              <circle cx="12" cy="12" r="6.5" />
              <circle cx="12" cy="12" r="2.2" />
            </svg>
          </button>
          <form class="search" id="searchForm">
            <input id="cityInput" type="search" placeholder="Город" autocomplete="off" enterkeyhint="search" />
          </form>
          <button class="icon-button" id="refreshButton" title="Обновить" aria-label="Обновить">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 12a8 8 0 1 1-2.34-5.66" />
              <path d="M20 4v6h-6" />
            </svg>
          </button>
        </div>
        <div class="lang-switch" aria-label="Language">
          <button type="button" data-lang="ru">RU</button>
          <button type="button" data-lang="kk">KZ</button>
          <button type="button" data-lang="en">EN</button>
        </div>
        <div class="favorites-row" id="favoritesRow"></div>

        <div class="current">
          <div class="weather-orb" aria-hidden="true">
            <span id="heroIcon"></span>
          </div>
          <p class="location" id="locationName">Загрузка...</p>
          <h1 id="temperature">--°</h1>
          <p class="condition" id="condition">Получаем прогноз</p>
          <p class="range" id="range">Макс. --° Мин. --°</p>
          <div class="hero-metrics" id="heroMetrics"></div>
          <button class="save-city" id="saveCityButton" type="button">⭐</button>
        </div>
      </section>

      <section class="alert-card" id="alertCard" hidden></section>

      <section class="panel hourly-panel">
        <h2 id="hourlyTitle">По часам</h2>
        <div class="hourly" id="hourly"></div>
      </section>

      <section class="panel charts-panel">
        <h2 id="chartsTitle">Графики</h2>
        <div class="chart-block">
          <div class="chart-header">
            <div class="chart-title" id="tempChartTitle">Температура</div>
            <div class="chart-meta" id="tempChartMeta"></div>
          </div>
          <div class="chart-wrap">
            <svg id="tempChart" viewBox="0 0 320 130" preserveAspectRatio="none"></svg>
            <div class="chart-tooltip" id="tempTooltip"></div>
          </div>
        </div>
        <div class="chart-block">
          <div class="chart-header">
            <div class="chart-title" id="rainChartTitle">Осадки</div>
            <div class="chart-meta" id="rainChartMeta"></div>
          </div>
          <div class="chart-wrap">
            <svg id="rainChart" viewBox="0 0 320 130" preserveAspectRatio="none"></svg>
            <div class="chart-tooltip" id="rainTooltip"></div>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2 id="dailyTitle">Прогноз на 7 дней</h2>
        <div class="daily" id="daily"></div>
      </section>

      <section class="stats-grid" id="stats"></section>
    </main>

    <template id="hourTemplate">
      <article class="hour-card">
        <span class="hour"></span>
        <span class="hour-icon"></span>
        <strong class="hour-temp"></strong>
        <span class="hour-rain"></span>
      </article>
    </template>

    <script src="./app.js"></script>
    <script type="module" src="./weather3d.js"></script>
  </body>
</html>
